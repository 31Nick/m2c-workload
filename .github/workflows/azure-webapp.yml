name: Azure Web App CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'infra/**'
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/azure-webapp.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: azure-webapp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      infra_changed: ${{ steps.changes.outputs.infra_changed }}
      frontend_changed: ${{ steps.changes.outputs.frontend_changed }}
      backend_changed: ${{ steps.changes.outputs.backend_changed }}
      app_changed: ${{ steps.changes.outputs.app_changed }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed areas
        id: changes
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "infra_changed=true" >> "$GITHUB_OUTPUT"
            echo "frontend_changed=true" >> "$GITHUB_OUTPUT"
            echo "backend_changed=true" >> "$GITHUB_OUTPUT"
            echo "app_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [[ -z "$BEFORE" || "$BEFORE" == "0000000000000000000000000000000000000000" ]]; then
            BEFORE="$(git rev-parse "${AFTER}^" 2>/dev/null || true)"
          fi

          if [[ -n "$BEFORE" ]]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE" "$AFTER")"
          else
            CHANGED_FILES="$(git show --pretty='' --name-only "$AFTER")"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          INFRA_CHANGED=false
          FRONTEND_CHANGED=false
          BACKEND_CHANGED=false

          while IFS= read -r FILE; do
            [[ -z "$FILE" ]] && continue
            case "$FILE" in
              infra/*)
                INFRA_CHANGED=true
                ;;
              frontend/*)
                FRONTEND_CHANGED=true
                ;;
              backend/*)
                BACKEND_CHANGED=true
                ;;
            esac
          done <<< "$CHANGED_FILES"

          if [[ "$FRONTEND_CHANGED" == "true" || "$BACKEND_CHANGED" == "true" ]]; then
            APP_CHANGED=true
          else
            APP_CHANGED=false
          fi

          echo "infra_changed=$INFRA_CHANGED" >> "$GITHUB_OUTPUT"
          echo "frontend_changed=$FRONTEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "backend_changed=$BACKEND_CHANGED" >> "$GITHUB_OUTPUT"
          echo "app_changed=$APP_CHANGED" >> "$GITHUB_OUTPUT"

  deploy-infra:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.infra_changed == 'true'
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_APP_NAME_PREFIX: ${{ vars.AZURE_APP_NAME_PREFIX }}
    outputs:
      web_app_name: ${{ steps.infra.outputs.web_app_name }}
      web_app_hostname: ${{ steps.infra.outputs.web_app_hostname }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create or update resource group
        run: az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION"

      - name: Deploy Azure infrastructure
        id: infra
        shell: bash
        run: |
          OUTPUTS=$(az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "m2c-${GITHUB_RUN_NUMBER}" \
            --template-file infra/main.bicep \
            --parameters location="$AZURE_LOCATION" appNamePrefix="$AZURE_APP_NAME_PREFIX" \
            --query properties.outputs \
            --output json)

          echo "web_app_name=$(echo "$OUTPUTS" | jq -r '.webAppName.value')" >> "$GITHUB_OUTPUT"
          echo "web_app_hostname=$(echo "$OUTPUTS" | jq -r '.webAppHostName.value')" >> "$GITHUB_OUTPUT"

  deploy-app:
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - deploy-infra
    if: always() && needs.detect-changes.outputs.app_changed == 'true' && (needs.deploy-infra.result == 'success' || needs.deploy-infra.result == 'skipped')
    env:
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_APP_NAME_PREFIX: ${{ vars.AZURE_APP_NAME_PREFIX }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Copy frontend build into backend static directory
        run: |
          rm -rf backend/app/static/*
          cp -R frontend/dist/. backend/app/static/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve target web app
        id: resolve_target
        shell: bash
        run: |
          WEB_APP_NAME="${{ needs.deploy-infra.outputs.web_app_name }}"
          WEB_APP_HOSTNAME="${{ needs.deploy-infra.outputs.web_app_hostname }}"

          if [[ -z "$WEB_APP_NAME" ]]; then
            WEB_APP_NAME=$(az webapp list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "[?starts_with(name, '${AZURE_APP_NAME_PREFIX}-') && tags.workload=='m2c-workload'].name | [0]" \
              --output tsv)

            WEB_APP_HOSTNAME=$(az webapp list \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --query "[?name=='$WEB_APP_NAME'].defaultHostName | [0]" \
              --output tsv)
          fi

          if [[ -z "$WEB_APP_NAME" || "$WEB_APP_NAME" == "null" ]]; then
            echo "No target web app found. Run an infra deployment first or confirm AZURE_RESOURCE_GROUP/AZURE_APP_NAME_PREFIX." >&2
            exit 1
          fi

          echo "web_app_name=$WEB_APP_NAME" >> "$GITHUB_OUTPUT"
          echo "web_app_hostname=$WEB_APP_HOSTNAME" >> "$GITHUB_OUTPUT"

      - name: Deploy application package
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ steps.resolve_target.outputs.web_app_name }}
          package: backend

      - name: Show deployment URL
        run: echo "https://${{ steps.resolve_target.outputs.web_app_hostname }}"
